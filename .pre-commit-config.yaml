repos:

  # --------------------------------------------------
  # Black
  # --------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  # --------------------------------------------------
  # Ruff
  # --------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.2
    hooks:
      - id: ruff

  # --------------------------------------------------
  # MyPy
  # --------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        pass_filenames: false
        args:
          - app
        additional_dependencies:
          - types-requests