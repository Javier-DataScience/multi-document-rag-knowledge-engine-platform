services:

  api:
    build:
      context: .
      dockerfile: Dockerfiles/api.Dockerfile
    container_name: rag_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  streamlit:
    build:
      context: .
      dockerfile: Dockerfiles/streamlit.Dockerfile
    container_name: rag_streamlit
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - FASTAPI_URL=http://api:8000

  gradio:
    build:
      context: .
      dockerfile: Dockerfiles/gradio.Dockerfile
    container_name: rag_gradio
    ports:
      - "7860:7860"
    depends_on:
      - api
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - FASTAPI_URL=http://api:8000